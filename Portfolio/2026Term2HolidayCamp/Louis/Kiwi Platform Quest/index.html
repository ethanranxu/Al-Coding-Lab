<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kiwi Platform Quest</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <section class="hud" aria-label="Game status">
        <div class="brand">
          <span class="brand-mark"></span>
          <span>Kiwi Platform Quest</span>
        </div>
        <div class="stats">
          <span id="stars">Stars 0/5</span>
          <span id="lives">Lives 3</span>
          <span id="time">Time 000</span>
        </div>
      </section>

      <div class="stage-wrap">
        <canvas id="game" width="1120" height="630" aria-label="Playable one level platform game"></canvas>
        <div class="overlay" id="overlay">
          <h1>Kiwi Platform Quest</h1>
          <p>Run, jump, grab every star, and reach the red door.</p>
          <button id="startButton" type="button">Start Level 1</button>
        </div>
      </div>

      <section class="controls" aria-label="Touch controls">
        <div class="pad">
          <button class="icon-button" type="button" data-hold="left" aria-label="Move left">←</button>
          <button class="icon-button" type="button" data-hold="right" aria-label="Move right">→</button>
        </div>
        <button class="jump-button" type="button" data-hold="jump" aria-label="Jump">↑</button>
      </section>
    </main>

    <script src="game.js"></script>
    <script src="/tracker.js"></script>
  </body>
</html>
